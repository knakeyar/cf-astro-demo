<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Upload Media</title>

    <style>
        body {
            margin: 0;
            font-family: system-ui, sans-serif;
            background: #f3f4f6;
            color: #111827;
        }

        .page {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 2rem;
        }

        .card {
            width: 100%;
            max-width: 680px;
            background: white;
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
        }

        h1 {
            margin: 0 0 0.5rem;
        }

        .hint {
            color: #6b7280;
            line-height: 1.5;
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-weight: 700;
            margin-top: 1.25rem;
            margin-bottom: 0.5rem;
        }

        select,
        input[type="file"] {
            width: 100%;
            padding: 0.85rem;
            border: 1px solid #d1d5db;
            border-radius: 0.6rem;
            background: white;
        }

        button,
        .link-button {
            margin-top: 1rem;
            width: 100%;
            padding: 0.9rem 1rem;
            border: 0;
            border-radius: 0.6rem;
            background: #111827;
            color: white;
            font-weight: 800;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            display: block;
            box-sizing: border-box;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .secondary {
            background: #374151;
        }

        .status {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 0.75rem;
            display: none;
        }

        .status.success {
            display: block;
            background: #ecfdf5;
            border: 1px solid #10b981;
        }

        .status.error {
            display: block;
            background: #fef2f2;
            border: 1px solid #ef4444;
        }

        .url-box {
            margin-top: 1rem;
            padding: 0.85rem;
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 0.5rem;
            word-break: break-all;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 0.9rem;
        }

        .meta {
            margin-top: 0.75rem;
            color: #4b5563;
            font-size: 0.95rem;
        }
    </style>
</head>

<body>
    <main class="page">
        <section class="card">
            <h1>Upload Media</h1>
            <p class="hint">
                Upload files to Cloudflare R2. After upload, copy the generated URL into
                Decap CMS as a resource URL.
            </p>

            <form id="upload-form">
                <label for="category">Category</label>
                <select id="category" name="category">
                    <option value="resources">Resources</option>
                    <option value="images">Images</option>
                    <option value="thumbnails">Thumbnails</option>
                </select>

                <label for="file">File</label>
                <input id="file" type="file" name="file" required />

                <button id="upload-button" type="submit">Upload to R2</button>
            </form>

            <div id="status" class="status"></div>
        </section>
    </main>

    <script>
        const form = document.getElementById("upload-form");
        const button = document.getElementById("upload-button");
        const statusBox = document.getElementById("status");

        let uploadedUrl = "";

        form.addEventListener("submit", async (event) => {
            event.preventDefault();

            statusBox.className = "status";
            statusBox.innerHTML = "";
            button.disabled = true;
            button.textContent = "Uploading...";

            try {
                const formData = new FormData(form);

                const response = await fetch("/api/upload", {
                    method: "POST",
                    body: formData,
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || "Upload failed");
                }

                uploadedUrl = data.url;

                statusBox.className = "status success";
                statusBox.innerHTML = `
            <strong>File uploaded successfully.</strong>

            <div class="meta">
              <div><strong>Key:</strong> ${data.key}</div>
              <div><strong>Type:</strong> ${data.contentType}</div>
              <div><strong>Size:</strong> ${Math.round(data.size / 1024)} KB</div>
            </div>

            <div class="url-box">${uploadedUrl}</div>

            <button class="secondary" type="button" id="copy-button">
              Copy URL
            </button>

            <a class="link-button secondary" href="${uploadedUrl}" download target="_blank" rel="noopener noreferrer">
              Test Download
            </a>
          `;

                document.getElementById("copy-button").addEventListener("click", async () => {
                    await navigator.clipboard.writeText(uploadedUrl);
                    document.getElementById("copy-button").textContent = "Copied!";
                });

                form.reset();
            } catch (error) {
                statusBox.className = "status error";
                statusBox.innerHTML = `<strong>Upload failed.</strong><br />${error.message}`;
            } finally {
                button.disabled = false;
                button.textContent = "Upload to R2";
            }
        });
    </script>
</body>

</html>
